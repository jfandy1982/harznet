name: Local ActionLint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  actionlint:
    name: Lint Workflow Files
    uses: jfandy1982/shared-github-workflows/.github/workflows/reusable-actionlint.yml@main
    permissions:
      contents: read
      pull-requests: write
